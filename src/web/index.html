<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tempco Heating Dashboard</title>
<style>
  :root {
    --bg-primary: #0f1117;
    --bg-secondary: #1a1d27;
    --bg-card: #222636;
    --bg-card-hover: #2a2f42;
    --text-primary: #e8eaf0;
    --text-secondary: #8b90a0;
    --text-muted: #5c6070;
    --accent-blue: #3b82f6;
    --accent-green: #22c55e;
    --accent-red: #ef4444;
    --accent-orange: #f59e0b;
    --accent-purple: #a855f7;
    --border: #2d3248;
    --font-mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
    --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    --radius: 12px;
    --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    --transition: 200ms ease;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.5;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  header h1 span {
    color: var(--accent-blue);
  }

  .header-status {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 13px;
    color: var(--text-secondary);
  }

  .status-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent-green);
    transition: background var(--transition);
  }

  .status-dot.disconnected {
    background: var(--accent-red);
    animation: pulse-red 2s ease-in-out infinite;
  }

  @keyframes pulse-red {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Main Grid ──────────────────────────────────────────── */
  main {
    padding: 24px;
    max-width: 1440px;
    margin: 0 auto;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 24px;
    color: var(--text-muted);
    font-size: 15px;
  }

  .empty-state .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* ── Zone Card ──────────────────────────────────────────── */
  .zone-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: background var(--transition), border-color var(--transition),
                transform var(--transition);
    position: relative;
    overflow: hidden;
  }

  .zone-card:hover {
    background: var(--bg-card-hover);
    border-color: #3a3f55;
    transform: translateY(-1px);
  }

  .zone-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: var(--card-accent, var(--accent-blue));
    transition: background var(--transition);
  }

  .zone-card.status-cold { --card-accent: var(--accent-blue); }
  .zone-card.status-ok { --card-accent: var(--accent-green); }
  .zone-card.status-hot { --card-accent: var(--accent-red); }
  .zone-card.status-heating { --card-accent: var(--accent-orange); }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .zone-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.3;
  }

  .zone-id {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    margin-top: 2px;
  }

  /* ── Temperature Display ────────────────────────────────── */
  .temp-display {
    text-align: center;
    margin: 20px 0;
  }

  .current-temp {
    font-family: var(--font-mono);
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -2px;
    line-height: 1;
    transition: color var(--transition);
  }

  .current-temp .unit {
    font-size: 24px;
    font-weight: 400;
    color: var(--text-secondary);
    letter-spacing: 0;
  }

  .temp-label {
    font-size: 12px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-top: 4px;
  }

  /* ── Target Control ─────────────────────────────────────── */
  .target-control {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    margin: 20px 0;
    padding: 12px;
    background: rgba(0, 0, 0, 0.2);
    border-radius: 10px;
  }

  .target-btn {
    width: 40px;
    height: 40px;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 20px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition);
    user-select: none;
    line-height: 1;
  }

  .target-btn:hover {
    background: var(--accent-blue);
    border-color: var(--accent-blue);
    color: #fff;
  }

  .target-btn:active {
    transform: scale(0.92);
  }

  .target-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
  }

  .target-value {
    font-family: var(--font-mono);
    font-size: 22px;
    font-weight: 600;
    min-width: 72px;
    text-align: center;
  }

  .target-value .label {
    font-size: 10px;
    font-weight: 400;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: block;
    font-family: var(--font-sans);
  }

  /* ── Heating Indicator ────────────────────────────────────── */
  .heating-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 12px 0;
    padding: 8px 12px;
    border-radius: 8px;
    background: rgba(0, 0, 0, 0.15);
  }

  .heating-indicator.heating-on {
    color: var(--accent-orange);
  }

  .heating-indicator.heating-off {
    color: var(--text-muted);
  }

  .heating-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .heating-on .heating-dot {
    background: var(--accent-orange);
    animation: pulse-heating 1.5s ease-in-out infinite;
  }

  .heating-off .heating-dot {
    background: var(--text-muted);
  }

  @keyframes pulse-heating {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── Pending Indicator ────────────────────────────────────── */
  .pending-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--accent-orange);
    letter-spacing: 0.3px;
  }

  .pending-indicator .pending-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent-orange);
    animation: pulse-pending 1.2s ease-in-out infinite;
  }

  .confirmed-indicator {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--accent-green);
    letter-spacing: 0.3px;
  }

  @keyframes pulse-pending {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── Card Footer & Mode Controls ──────────────────────────── */
  .card-footer {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .card-footer-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .last-update {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .mode-btn-group {
    display: flex;
    gap: 4px;
  }

  .mode-btn {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition);
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }

  .mode-btn:hover {
    border-color: var(--text-muted);
    color: var(--text-primary);
  }

  .mode-btn.active-comfort {
    background: rgba(34, 197, 94, 0.2);
    border-color: var(--accent-green);
    color: var(--accent-green);
  }

  .mode-btn.active-antifreeze {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  .mode-btn.active-off {
    background: rgba(100, 100, 120, 0.2);
    border-color: var(--text-muted);
    color: var(--text-secondary);
  }

  /* ── Raw flag22 debug input ──────────────────────────────── */
  .flag22-debug {
    display: none;
    align-items: center;
    gap: 6px;
  }

  .flag22-debug.visible {
    display: flex;
  }

  .flag22-input {
    width: 48px;
    padding: 4px 6px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-family: var(--font-mono);
    font-size: 12px;
    text-align: center;
  }

  .flag22-send {
    font-size: 11px;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    background: var(--bg-secondary);
    color: var(--text-secondary);
    cursor: pointer;
    transition: all var(--transition);
  }

  .flag22-send:hover {
    border-color: var(--accent-blue);
    color: var(--accent-blue);
  }

  /* ── Toast Notifications ────────────────────────────────── */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    display: flex;
    flex-direction: column-reverse;
    gap: 8px;
    z-index: 1000;
    pointer-events: none;
  }

  .toast {
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    pointer-events: auto;
    animation: toast-in 300ms ease forwards;
    max-width: 360px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  .toast.success {
    background: var(--accent-green);
    color: #052e16;
  }

  .toast.error {
    background: var(--accent-red);
  }

  .toast.removing {
    animation: toast-out 200ms ease forwards;
  }

  @keyframes toast-in {
    from { opacity: 0; transform: translateY(12px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @keyframes toast-out {
    from { opacity: 1; transform: translateY(0) scale(1); }
    to { opacity: 0; transform: translateY(-8px) scale(0.95); }
  }

  /* ── Mode Badge ─────────────────────────────────────────── */
  .mode-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 5px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    cursor: pointer;
    user-select: none;
  }

  .mode-comfort { background: rgba(34, 197, 94, 0.15); color: var(--accent-green); }
  .mode-eco { background: rgba(59, 130, 246, 0.15); color: var(--accent-blue); }
  .mode-antifreeze { background: rgba(147, 197, 253, 0.15); color: #93c5fd; }
  .mode-off { background: rgba(100, 100, 120, 0.15); color: var(--text-muted); }
  .mode-boost { background: rgba(239, 68, 68, 0.15); color: var(--accent-red); }
  .mode-program { background: rgba(168, 85, 247, 0.15); color: var(--accent-purple); }

  /* ── Responsive ─────────────────────────────────────────── */
  @media (max-width: 640px) {
    header {
      padding: 12px 16px;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
    }

    main {
      padding: 16px;
    }

    .grid {
      grid-template-columns: 1fr;
      gap: 16px;
    }

    .current-temp {
      font-size: 40px;
    }

    #toast-container {
      bottom: 16px;
      right: 16px;
      left: 16px;
    }

    .toast {
      max-width: unset;
    }
  }
</style>
</head>
<body>

<header>
  <h1><span>Tempco</span> Heating Dashboard</h1>
  <div class="header-status">
    <span id="device-count">--</span>
    <div class="status-indicator">
      <div id="status-dot" class="status-dot"></div>
      <span id="status-text">Connecting...</span>
    </div>
  </div>
</header>

<main>
  <div id="grid" class="grid">
    <div class="empty-state">
      <div class="spinner"></div>
      Loading zone data...
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script>
(function() {
  'use strict';

  // ── State ──────────────────────────────────────────────────
  let devices = {};
  let connected = false;
  let refreshTimer = null;
  let pendingCommands = new Set();

  // ── Temperature Helpers ────────────────────────────────────
  function rawToCelsius(raw) {
    var n = parseFloat(raw);
    if (!isFinite(n)) return NaN;
    return Math.round(((n - 320) / 18) * 10) / 10;
  }

  function formatTemp(celsius) {
    if (!isFinite(celsius)) return '--.-';
    return celsius.toFixed(1);
  }

  function formatTime(ts) {
    if (!ts) return '--:--:--';
    try {
      var d = new Date(ts);
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch(e) {
      return ts;
    }
  }

  // Mode flag22 mapping — must match src/modes.ts
  var MODE_MAP = {
    '0':  'comfort',
    '1':  'off',
    '2':  'antifreeze',
    '3':  'eco',
    '4':  'boost',
    '11': 'program',
  };

  function getModeName(dev) {
    // Prefer server-provided mode name if available
    if (dev.mode) return dev.mode;
    return MODE_MAP[dev.flag22] || ('unknown(' + dev.flag22 + ')');
  }

  // ── Toasts ─────────────────────────────────────────────────
  function showToast(message, type) {
    var container = document.getElementById('toast-container');
    var toast = document.createElement('div');
    toast.className = 'toast ' + (type || 'success');
    toast.textContent = message;
    container.appendChild(toast);

    setTimeout(function() {
      toast.classList.add('removing');
      setTimeout(function() {
        if (toast.parentNode) toast.parentNode.removeChild(toast);
      }, 200);
    }, 3000);
  }

  // ── Target field helpers ──────────────────────────────────
  // Maps mode name to the DeviceState field holding its target temperature
  var TARGET_FIELD = {
    comfort: 'comfort', antifreeze: 'frost', eco: 'eco', boost: 'boost',
    off: 'comfort', program: 'comfort',
  };

  function getDeviceTarget(dev) {
    var mode = getModeName(dev);
    var field = TARGET_FIELD[mode] || 'comfort';
    return rawToCelsius(dev[field]);
  }

  // ── Card Status Class ──────────────────────────────────────
  function getStatusClass(device) {
    var current = rawToCelsius(device.temperature_air);
    var target = getDeviceTarget(device);
    var heating = device.heating_up === '1' || device.heating === true;

    if (!isFinite(current) || !isFinite(target)) return 'status-ok';
    if (heating) return 'status-heating';
    if (current < target - 1) return 'status-cold';
    if (current >= target - 1 && current <= target + 0.5) return 'status-ok';
    return 'status-ok';
  }

  // ── API Calls ──────────────────────────────────────────────
  function fetchDevices() {
    fetch('/api/devices')
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function(data) {
        devices = data;
        if (!connected) {
          connected = true;
          updateConnectionStatus();
        }
        renderGrid();
      })
      .catch(function(err) {
        console.error('Fetch error:', err);
        if (connected) {
          connected = false;
          updateConnectionStatus();
        }
      });
  }

  function setTemperature(deviceId, celsius) {
    var key = deviceId + ':temp';
    if (pendingCommands.has(key)) return;
    pendingCommands.add(key);

    fetch('/api/devices/' + encodeURIComponent(deviceId) + '/temperature', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ celsius: celsius }),
    })
    .then(function(res) {
      pendingCommands.delete(key);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      showToast('Target set to ' + celsius.toFixed(1) + '\u00B0C', 'success');
      // Optimistic update — update the right field for the active mode
      if (devices[deviceId]) {
        var rawVal = String(Math.round(celsius * 18 + 320));
        var mode = getModeName(devices[deviceId]);
        var field = TARGET_FIELD[mode] || 'comfort';
        devices[deviceId][field] = rawVal;
        if (field === 'comfort') devices[deviceId].manual = rawVal;
        renderGrid();
      }
    })
    .catch(function(err) {
      pendingCommands.delete(key);
      showToast('Failed to set temperature: ' + err.message, 'error');
    });
  }

  function setMode(deviceId, mode, flag22) {
    var key = deviceId + ':mode';
    if (pendingCommands.has(key)) return;
    pendingCommands.add(key);

    // If called with a mode name, send { mode }, else send { flag22 }
    var body = mode ? { mode: mode } : { flag22: flag22 };

    fetch('/api/devices/' + encodeURIComponent(deviceId) + '/mode', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    })
    .then(function(res) {
      pendingCommands.delete(key);
      if (!res.ok) return res.json().then(function(d) { throw new Error(d.error || 'HTTP ' + res.status); });
      return res.json();
    })
    .then(function(data) {
      if (!data) return;
      showToast('Mode set to ' + data.mode, 'success');
      if (devices[deviceId]) {
        devices[deviceId].flag22 = data.flag22;
        devices[deviceId].mode = data.mode;
        renderGrid();
      }
    })
    .catch(function(err) {
      pendingCommands.delete(key);
      showToast('Failed to set mode: ' + err.message, 'error');
    });
  }

  // ── Connection Status ──────────────────────────────────────
  function updateConnectionStatus() {
    var dot = document.getElementById('status-dot');
    var text = document.getElementById('status-text');
    if (connected) {
      dot.className = 'status-dot';
      text.textContent = 'Connected';
    } else {
      dot.className = 'status-dot disconnected';
      text.textContent = 'Disconnected';
    }
  }

  // ── Render ─────────────────────────────────────────────────
  function renderGrid() {
    var grid = document.getElementById('grid');
    var ids = Object.keys(devices);

    // Sort by zone label, falling back to device id
    ids.sort(function(a, b) {
      var la = (devices[a].zone_label || devices[a].label || a).toLowerCase();
      var lb = (devices[b].zone_label || devices[b].label || b).toLowerCase();
      return la.localeCompare(lb);
    });

    document.getElementById('device-count').textContent = ids.length + ' zone' + (ids.length !== 1 ? 's' : '');

    if (ids.length === 0) {
      grid.innerHTML = '<div class="empty-state"><div class="spinner"></div>Waiting for zone data...</div>';
      return;
    }

    // Build HTML for all cards
    var html = '';
    for (var i = 0; i < ids.length; i++) {
      var id = ids[i];
      var dev = devices[id];
      var currentTemp = rawToCelsius(dev.temperature_air);
      var mode = getModeName(dev);
      var targetTemp = getDeviceTarget(dev);
      var heating = dev.heating_up === '1' || dev.heating === true;
      var statusClass = getStatusClass(dev);
      var zoneName = dev.zone_label || dev.label || 'Zone ' + id;

      html += '<div class="zone-card ' + statusClass + '" data-id="' + id + '">';

      // Header
      html += '<div class="card-header">';
      html += '<div>';
      html += '<div class="zone-name">' + escapeHtml(zoneName) + '</div>';
      html += '<div class="zone-id">#' + escapeHtml(id) + '</div>';
      html += '</div>';
      html += '<span class="mode-badge mode-' + mode + '" onclick="window.__tempco.toggleFlag22Debug(\'' + id + '\')" title="Click to show raw flag22 input">' + mode + '</span>';
      html += '</div>';

      // Temperature display
      html += '<div class="temp-display">';
      html += '<div class="current-temp" style="color: var(--card-accent)">';
      html += formatTemp(currentTemp) + '<span class="unit">\u00B0C</span>';
      html += '</div>';
      html += '<div class="temp-label">Air Temperature</div>';
      html += '</div>';

      // Target control — label reflects which mode's temperature is shown
      var targetLabel = 'Target';
      if (mode === 'antifreeze') targetLabel = 'Frost';
      else if (mode === 'eco') targetLabel = 'Eco';
      else if (mode === 'boost') targetLabel = 'Boost';

      html += '<div class="target-control">';
      html += '<button class="target-btn" onclick="window.__tempco.adjustTarget(\'' + id + '\', -0.5)" title="Decrease by 0.5\u00B0C">&minus;</button>';
      html += '<div class="target-value">';
      html += '<span class="label">' + targetLabel + '</span>';
      html += formatTemp(targetTemp) + '\u00B0C';
      html += '</div>';
      html += '<button class="target-btn" onclick="window.__tempco.adjustTarget(\'' + id + '\', 0.5)" title="Increase by 0.5\u00B0C">+</button>';
      html += '</div>';

      // Pending confirmation indicator
      if (dev.pending_confirmation) {
        html += '<div class="pending-indicator"><div class="pending-dot"></div>Waiting for controller</div>';
      }

      // Heating status
      var heatingClass = heating ? 'heating-on' : 'heating-off';
      var heatingText = heating ? 'Heating' : 'Idle';
      html += '<div class="heating-indicator ' + heatingClass + '">';
      html += '<div class="heating-dot"></div>';
      html += heatingText;
      html += '</div>';

      // Footer — mode controls
      html += '<div class="card-footer">';
      html += '<div class="card-footer-row">';
      html += '<div class="last-update">' + formatTime(dev.last_update) + '</div>';
      html += '<div class="mode-btn-group">';
      html += '<button class="mode-btn' + (mode === 'comfort' ? ' active-comfort' : '') + '" onclick="window.__tempco.setMode(\'' + id + '\', \'comfort\')">Comfort</button>';
      html += '<button class="mode-btn' + (mode === 'antifreeze' ? ' active-antifreeze' : '') + '" onclick="window.__tempco.setMode(\'' + id + '\', \'antifreeze\')">Anti Freeze</button>';
      html += '<button class="mode-btn' + (mode === 'off' ? ' active-off' : '') + '" onclick="window.__tempco.setMode(\'' + id + '\', \'off\')">Off</button>';
      html += '</div>';
      html += '</div>';
      // Raw flag22 debug input (toggled by clicking mode badge)
      html += '<div class="flag22-debug" id="flag22-debug-' + id + '">';
      html += '<span style="font-size:11px;color:var(--text-muted)">flag22:</span>';
      html += '<input class="flag22-input" id="flag22-input-' + id + '" type="text" value="' + escapeHtml(dev.flag22) + '" placeholder="0">';
      html += '<button class="flag22-send" onclick="window.__tempco.sendRawFlag22(\'' + id + '\')">Send</button>';
      html += '</div>';
      html += '</div>';

      html += '</div>';
    }

    grid.innerHTML = html;
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(str));
    return div.innerHTML;
  }

  // ── Public API for inline handlers ─────────────────────────
  window.__tempco = {
    adjustTarget: function(deviceId, delta) {
      var dev = devices[deviceId];
      if (!dev) return;
      var current = getDeviceTarget(dev);
      if (!isFinite(current)) return;
      var next = Math.round((current + delta) * 10) / 10;
      // Clamp to reasonable range
      var min = rawToCelsius(dev.min_set);
      var max = rawToCelsius(dev.max_set);
      if (isFinite(min) && next < min) next = min;
      if (isFinite(max) && next > max) next = max;
      if (next < 5) next = 5;
      if (next > 35) next = 35;
      setTemperature(deviceId, next);
    },
    setMode: function(deviceId, modeName) {
      setMode(deviceId, modeName, null);
    },
    sendRawFlag22: function(deviceId) {
      var input = document.getElementById('flag22-input-' + deviceId);
      if (!input) return;
      var val = input.value.trim();
      if (val === '') return;
      setMode(deviceId, null, val);
    },
    toggleFlag22Debug: function(deviceId) {
      var el = document.getElementById('flag22-debug-' + deviceId);
      if (!el) return;
      el.classList.toggle('visible');
    }
  };

  // ── Init ───────────────────────────────────────────────────
  fetchDevices();
  refreshTimer = setInterval(fetchDevices, 5000);
})();
</script>
</body>
</html>
